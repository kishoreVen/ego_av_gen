<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>ObjectRecorder Viewer</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0b0d; overflow: hidden; font-family: -apple-system, sans-serif; color: #eee; }
  #topbar {
    position: absolute; top: 0; left: 0; right: 0; height: 48px; z-index: 20;
    display: flex; align-items: center; gap: 16px; padding: 0 14px;
    background: rgba(20,20,24,0.9); backdrop-filter: blur(6px); border-bottom: 1px solid #222;
  }
  #topbar h1 { font-size: 14px; margin: 0; white-space: nowrap; }
  #topbar select { background: #1c1c20; color: #eee; border: 1px solid #333; border-radius: 6px; padding: 4px 6px; }
  .tab-btn {
    background: transparent; border: 1px solid #333; color: #aaa; border-radius: 6px;
    padding: 6px 12px; font-size: 13px; cursor: pointer;
  }
  .tab-btn.active { background: #2a5fa0; color: #fff; border-color: #2a5fa0; }
  .view { position: absolute; top: 48px; left: 0; right: 0; bottom: 0; display: none; }
  .view.active { display: block; }

  #canvas-container { position: absolute; inset: 0; }
  #panel {
    position: absolute; top: 12px; left: 12px; z-index: 10;
    background: rgba(20,20,24,0.85); padding: 12px 14px;
    border-radius: 10px; font-size: 13px; width: 240px; backdrop-filter: blur(6px);
  }
  #panel label { display: block; margin-top: 8px; color: #aaa; }
  #panel input[type=range] { width: 100%; }
  #panel .row { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
  #panel .stat { color: #8ecbff; }
  #panel .hint { color: #777; font-size: 11px; margin-top: 10px; line-height: 1.4; }

  #inspector { display: flex; height: 100%; padding: 16px; gap: 16px; box-sizing: border-box; }
  .inspector-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .inspector-col h2 { font-size: 13px; color: #aaa; margin: 0 0 8px; font-weight: 500; }
  .inspector-col video, .inspector-col img {
    width: 100%; max-height: calc(100vh - 160px); object-fit: contain; background: #000;
    border-radius: 8px; border: 1px solid #222;
  }
  #depth-status { margin-top: 8px; font-size: 12px; color: #888; }
  #depth-legend { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 11px; color: #999; }
  #depth-legend .bar { width: 120px; height: 8px; border-radius: 4px; background: linear-gradient(to right, #ff2222, #ffff22, #22ffff, #2222ff); }
</style>
</head>
<body>
  <div id="topbar">
    <h1>ObjectRecorder Viewer</h1>
    <select id="session-select"></select>
    <button class="tab-btn active" data-view="3d">3D Reconstruction</button>
    <button class="tab-btn" data-view="inspector">Video &amp; Depth</button>
    <span style="flex:1"></span>
    <span id="topbar-stats" style="font-size:12px;color:#888;"></span>
  </div>

  <div id="view-3d" class="view active">
    <div id="canvas-container"></div>
    <div id="panel">
      <div class="row"><span>Points</span><span class="stat" id="point-count">-</span></div>
      <div class="row"><span>Poses</span><span class="stat" id="pose-count">-</span></div>
      <div class="row"><span>Mode</span><span class="stat" id="mode">-</span></div>

      <label><input type="checkbox" id="show-trajectory" checked /> Trajectory</label>
      <label><input type="checkbox" id="show-frustums" checked /> Camera frustums</label>

      <label>Point size</label>
      <input type="range" id="point-size" min="0.002" max="0.03" step="0.001" value="0.008" />

      <div class="hint">Drag to orbit, scroll to zoom, right-drag to pan. Axes: X right, Y up, Z toward viewer (ARKit world space).</div>
    </div>
  </div>

  <div id="view-inspector" class="view">
    <div id="inspector">
      <div class="inspector-col">
        <h2>Video (transcoded to H.264)</h2>
        <video id="video-player" controls></video>
        <div id="depth-status">frame - / - &middot; t = -</div>
      </div>
      <div class="inspector-col">
        <h2>Depth (nearest frame, synced to video playback)</h2>
        <img id="depth-image" alt="depth heatmap" />
        <div id="depth-legend"><span>near</span><span class="bar"></span><span>far</span></div>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js",
        "three/addons/controls/OrbitControls.js": "./vendor/OrbitControls.js"
      }
    }
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
