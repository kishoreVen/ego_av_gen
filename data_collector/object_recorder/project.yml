name: ObjectRecorder
options:
  bundleIdPrefix: com.datacollector
  deploymentTarget:
    iOS: "17.0"
targets:
  ObjectRecorder:
    type: application
    platform: iOS
    sources:
      - ObjectRecorder
    info:
      path: Generated/Info.plist
      properties:
        UILaunchScreen: {}
        UIRequiresFullScreen: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSCameraUsageDescription: "Object Recorder needs camera access to record video, depth, and calibration data for object capture sessions."
        UIFileSharingEnabled: true
        LSSupportsOpeningDocumentsInPlace: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.datacollector.objectrecorder
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: NVXDLUHVWS
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
